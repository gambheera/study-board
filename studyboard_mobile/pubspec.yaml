name: studyboard_mobile
description: A/L Chemistry study OS
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  connectivity_plus: ^7.1.1
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  firebase_messaging: ^16.2.0
  flutter:
    sdk: flutter
  flutter_cache_manager: ^3.4.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  fpdart: ^1.1.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.0
  supabase_flutter: ^2.9.1
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.22.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  riverpod_generator: ^4.0.3
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/Nunito/
    - assets/fonts/JetBrainsMono/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito/Nunito-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Bold.ttf
          weight: 700
